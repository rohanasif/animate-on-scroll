<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://kit.fontawesome.com/3e18b8e052.js" crossorigin="anonymous"></script>
    <title>Document</title>
</head>

<body>
    <div class="bg">
        <nav>
            <img src="./images/github_octocat.png">
        </nav>
        <h1>AOS</h1>
        <h2>Animate On Scroll Library</h2>
        <p>SCROLL DOWN</p>
        <i class="fa-solid fa-angle-down"></i>
        <div class="heading">
            <h2 class="title">FADE</h2>
        </div>
        <div data-aos="fade-up" class="left">
            <p>Fade Up</p>
        </div>
        <div data-aos="fade-down" class="right">
            <p>Fade Down</p>
        </div>
        <div data-aos="fade-right" class="left">
            <p>Fade Right</p>
        </div>
        <div data-aos="fade-left" class="right">
            <p>Fade Left</p>
        </div>
        <div data-aos="fade-up-right" class="left">
            <p>Fade up-right</p>
        </div>
        <div data-aos="fade-up-left" class="right">
            <p>Fade up-left</p>
        </div>
        <div data-aos="fade-down-right" class="left">
            <p>Fade down-right</p>
        </div>
        <div data-aos="fade-down-left" class="right">
            <p>Fade down-left</p>
        </div>
        <div class="heading">
            <h2 class="title">FLIP</h2>
        </div>
        <div data-aos="flip-left" class="left">
            <p>Flip Left</p>
        </div>
        <div data-aos="flip-right" class="right">
            <p>Flip Right</p>
        </div>
        <div data-aos="flip-up" class="left">
            <p>Flip Up</p>
        </div>
        <div data-aos="flip-down" class="right">
            <p>Flip down</p>
        </div>

    </div>
</body>

<script>
    AOS.init();
</script>

</html>
